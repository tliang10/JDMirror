<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职镜JDMirror</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app" class="app-container">

    <header id="header" class="header">
      <div class="header-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="9" fill="rgba(255,255,255,0.2)"/>
          <rect x="7" y="9" width="22" height="18" rx="3" stroke="white" stroke-width="1.8" fill="none"/>
          <line x1="12" y1="14" x2="24" y2="14" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="12" y1="18" x2="22" y2="18" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="12" y1="22" x2="18" y2="22" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="28" cy="10" r="5" fill="#4caf50" stroke="white" stroke-width="1.2"/>
          <path d="M26.5 10L27.5 11L29.5 9" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="header-title">职镜JDMirror</h1>
        <p class="header-subtitle">看清JD，照见自己</p>
      </div>
      <button id="btn-settings" class="btn-header-icon" title="设置">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="3" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" fill="none"/>
          <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.3 3.3l1.4 1.4M13.3 13.3l1.4 1.4M3.3 14.7l1.4-1.4M13.3 4.7l1.4-1.4" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="btn-close" class="btn-header-icon" title="关闭">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M4 4l10 10M14 4l-10 10" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <main id="main-content" class="main-content">

      <div id="view-home" class="view view-home">
        <div class="action-cards">
          <button id="btn-jd" class="action-card action-card-jd">
            <span class="action-card-icon">
              <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
                <rect width="52" height="52" rx="14" fill="#e8f0fe"/>
                <rect x="14" y="12" width="24" height="28" rx="3" stroke="#1a73e8" stroke-width="2" fill="none"/>
                <path d="M18 20h16M18 25h16M18 30h10" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
                <circle cx="38" cy="14" r="7" fill="#1a73e8"/>
                <path d="M35.5 14l1.5 1.5 3-3" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="action-card-label">照JD</span>
            <span class="action-card-desc">AI解读招聘JD，提炼关键信息</span>
          </button>
          <button id="btn-resume" class="action-card action-card-resume">
            <span class="action-card-icon">
              <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
                <rect width="52" height="52" rx="14" fill="#e6f4ea"/>
                <circle cx="26" cy="18" r="8" stroke="#1e8e3e" stroke-width="2" fill="none"/>
                <path d="M14 42c0-6.627 5.373-12 12-12s12 5.373 12 12" stroke="#1e8e3e" stroke-width="2" fill="none" stroke-linecap="round"/>
                <circle cx="38" cy="14" r="7" fill="#1e8e3e"/>
                <path d="M35.5 14l1.5 1.5 3-3" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="action-card-label">照自己</span>
            <span class="action-card-desc">上传简历，AI分析匹配度</span>
          </button>
        </div>
        <div id="home-key-warning" class="home-key-warning" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="#e37400" stroke-width="1.5" fill="none"/>
            <path d="M8 5v3M8 11v1" stroke="#e37400" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>请先配置API Key</span>
          <button id="btn-goto-settings" class="btn-link">前往设置</button>
        </div>
      </div>

      <div id="view-settings" class="view view-settings" style="display:none;">
        <div class="view-header">
          <button id="btn-back-from-settings" class="btn-back" title="返回首页">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="view-title">API 设置</span>
          <div class="view-header-spacer"></div>
        </div>
        <div class="settings-content">
          <div class="setting-item">
            <label>AI 模型</label>
            <select id="settings-provider">
              <option value="deepseek">DeepSeek</option>
              <option value="qwen">通义千问 (Qwen)</option>
              <option value="glm">智谱 GLM</option>
            </select>
          </div>
          <div class="setting-item">
            <label>模型版本</label>
            <select id="settings-model">
            </select>
          </div>
          <div id="settings-key-section" class="setting-item">
            <label id="settings-key-label">API Key</label>
            <div class="key-input-row">
              <input type="password" id="settings-key-input" placeholder="请输入API Key" autocomplete="off">
              <button id="btn-toggle-key-visibility" class="btn-icon-sm" title="显示/隐藏">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" id="icon-eye">
                  <path d="M8 3C4.5 3 1.5 8 1.5 8s3 5 6.5 5 6.5-5 6.5-5-3-5-6.5-5z" stroke="currentColor" stroke-width="1.3" fill="none"/>
                  <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3" fill="none"/>
                </svg>
              </button>
            </div>
            <span id="settings-key-hint" class="setting-hint"></span>
          </div>
          <div class="settings-actions">
            <button id="btn-save-settings" class="btn-primary">保存设置</button>
            <button id="btn-delete-key" class="btn-danger-outline" style="display:none;">删除已保存的Key</button>
          </div>
          <div id="settings-status" class="settings-status" style="display:none;"></div>
        </div>
      </div>

      <div id="view-jd-result" class="view view-jd-result" style="display:none;">
        <div class="view-header">
          <button id="btn-back-from-jd" class="btn-back" title="返回首页">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="view-title">JD分析结果</span>
          <div class="view-header-spacer"></div>
        </div>
        <div class="jd-editor-section">
          <textarea id="jd-textarea" class="jd-textarea" rows="6" placeholder="JD文本将自动提取显示在此，你也可以手动编辑..."></textarea>
          <div class="jd-editor-actions">
            <button id="btn-save-jd" class="btn-secondary btn-sm" title="保存分析结果">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 10.5V12.5C2 12.7761 2.22386 13 2.5 13H11.5C11.7761 13 12 12.7761 12 12.5V10.5M7 1V10M7 10L4 7M7 10L10 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              保存
            </button>
            <button id="btn-reanalyze-jd" class="btn-primary btn-sm">重新分析</button>
          </div>
        </div>
        <div id="jd-accordion" class="accordion"></div>
        <div id="jd-error" class="error-box" style="display:none;"></div>
      </div>

      <div id="view-resume-upload" class="view view-resume-upload" style="display:none;">
        <div class="view-header">
          <button id="btn-back-from-upload" class="btn-back" title="返回首页">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="view-title">上传简历</span>
          <div class="view-header-spacer"></div>
        </div>
        <div id="upload-zone" class="upload-zone">
          <div class="upload-zone-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <path d="M24 32V16M24 16l-6 6M24 16l6 6" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 34h24" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="upload-zone-text">拖拽简历文件到此处</p>
          <p class="upload-zone-or">或</p>
          <button id="btn-select-file" class="btn-outline">选择文件</button>
          <p class="upload-zone-hint">支持 PDF、DOCX、TXT 格式，最大 5MB</p>
        </div>
        <div id="upload-progress" class="upload-progress" style="display:none;">
          <div class="upload-file-info">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="2" width="14" height="16" rx="2" stroke="#1a73e8" stroke-width="1.5" fill="none"/>
              <path d="M6 7h8M6 10h8M6 13h5" stroke="#1a73e8" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span id="upload-file-name" class="upload-file-name"></span>
          </div>
          <div class="upload-status">
            <span class="upload-spinner"></span>
            <span>解析中...</span>
          </div>
        </div>
        <div id="upload-error" class="error-box" style="display:none;"></div>
      </div>

      <div id="view-resume-result" class="view view-resume-result" style="display:none;">
        <div class="view-header">
          <button id="btn-back-from-resume" class="btn-back" title="返回首页">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="view-title">匹配分析</span>
          <div class="view-header-spacer"></div>
        </div>

        <div id="tab-match" class="tab-content active" style="display:block;">
          <div id="resume-thinking-overlay" class="resume-thinking-overlay" style="display:none;">
            <div class="thinking-indicator">
              <span class="thinking-dot"></span>
              <span class="thinking-dot"></span>
              <span class="thinking-dot"></span>
              <p>AI正在分析匹配度...</p>
            </div>
          </div>
          <div class="match-score-section">
            <div class="match-score-ring">
              <div class="score-circle" id="score-circle">
                <span class="score-value" id="score-value">0%</span>
              </div>
              <p class="score-label">综合匹配度</p>
            </div>
          </div>

          <div class="radar-section">
            <canvas id="radar-canvas" width="340" height="300"></canvas>
          </div>

          <div id="dimensions-list" class="dimensions-list"></div>

          <div id="strengths-section" class="analysis-section">
            <h4 class="section-title section-title-good">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 8l3 3 7-7" stroke="#1e8e3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              优势分析
            </h4>
            <ul id="strengths-list" class="analysis-list"></ul>
          </div>

          <div id="weaknesses-section" class="analysis-section">
            <h4 class="section-title section-title-warn">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6" stroke="#e37400" stroke-width="1.5" fill="none"/>
                <path d="M8 5v3M8 11v1" stroke="#e37400" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              不足分析
            </h4>
            <ul id="weaknesses-list" class="analysis-list"></ul>
          </div>

          <div id="interview-section" class="analysis-section">
            <h4 class="section-title section-title-blue">面试突击指南</h4>
            <ol id="interview-list" class="interview-list"></ol>
          </div>

          <div id="resume-error" class="error-box" style="display:none;"></div>
        </div>

        <div class="result-actions">
          <button id="btn-save-match" class="btn-secondary" title="保存匹配分析结果">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 10.5V12.5C2 12.7761 2.22386 13 2.5 13H11.5C11.7761 13 12 12.7761 12 12.5V10.5M7 1V10M7 10L4 7M7 10L10 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            保存
          </button>
          <button id="btn-change-resume" class="btn-secondary">更换简历</button>
          <button id="btn-reanalyze-resume" class="btn-primary">重新分析</button>
        </div>
      </div>

    </main>

    <footer id="footer" class="footer">
      <div id="resume-status" class="resume-status">
        <span class="status-dot status-dot-none"></span>
        <span class="status-text">未上传简历</span>
      </div>
    </footer>

    <div id="loading-overlay" class="loading-overlay" style="display:none;">
      <div class="loading-spinner"></div>
      <p class="loading-text">AI正在分析中...</p>
    </div>

    <div id="export-dialog" class="export-dialog" style="display:none;">
      <div class="export-dialog-mask"></div>
      <div class="export-dialog-body">
        <p class="export-dialog-title">选择导出格式</p>
        <div class="export-dialog-options">
          <button class="export-option" data-format="html">
            <span class="export-option-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M4 4h16v16H4z" stroke="#ea4335" stroke-width="2" fill="none"/>
                <path d="M7 8h10M7 12h8M7 16h6" stroke="#ea4335" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="export-option-label">HTML</span>
            <span class="export-option-desc">带样式的网页报告</span>
          </button>
          <button class="export-option" data-format="md">
            <span class="export-option-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M5 3l-2 6h2l1-2.5L7 9h2L7 3H5zm9 0v6h1.5V4.5L17 9h1.5V3H17v4.5L15.5 3H14z" fill="#1a73e8"/>
              </svg>
            </span>
            <span class="export-option-label">Markdown</span>
            <span class="export-option-desc">导入Notion/Obsidian</span>
          </button>
        </div>
        <button class="export-dialog-cancel">取消</button>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt" style="display:none;">

  <script src="../lib/pdf.min.js"></script>
  <script src="../lib/mammoth.browser.min.js"></script>
  <script src="../lib/jszip.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
